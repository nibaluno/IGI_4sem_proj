{% extends 'base.html' %}

{% block content %}
    <h2>Список клиентов магазина</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Логин</th>
                <th>Город</th>
                <th>Действие</th>
            </tr>
        </thead>
        <tbody>
            {% for client in clients %}
            <tr>
                <td>{{ client.username }}</td>
                <td>{{ client.city }}</td>
                <td><a href="{% url 'client_detail' pk=client.pk %}">Детали</a></td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">Клиентов пока нет.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
